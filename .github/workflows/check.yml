name: InvesteringsMelder

on:
  schedule:
    - cron: '30 7,13,19 * * 1-5'
  workflow_dispatch:
    inputs:
      test_bericht:
        description: 'Stuur een testbericht met volledige info (controle dat de melder werkt)'
        type: boolean
        default: false
      test_ticker:
        description: 'Welk aandeel in het testbericht (bijv. AAPL, MSFT, ASML)'
        type: string
        default: 'AAPL'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Packages installeren
        run: pip install -r requirements.txt

      - name: Bot uitvoeren
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_MODE: ${{ inputs.test_bericht }}
          TEST_TICKER: ${{ inputs.test_ticker }}
        run: python bot.py

      - name: Geheugen bewaren (verzonden meldingen)
        if: ${{ github.event.inputs.test_bericht != 'true' }}
        run: |
          if [ -n "$(git status --porcelain verzonden.json)" ]; then
            git config user.name "investeringsmelder-bot"
            git config user.email "actions@users.noreply.github.com"
            git add verzonden.json
            git commit -m "Geheugen: verzonden meldingen bijgewerkt [skip ci]"
            git push
          else
            echo "Geen wijziging in geheugen."
          fi
